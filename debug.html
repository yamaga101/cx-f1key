<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>cx-f1key Debug</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  background: #0d1117; color: #c9d1d9; padding: 20px;
  font-size: 13px; line-height: 1.5;
}
h1 { font-size: 16px; color: #58a6ff; margin-bottom: 16px; }
h2 { font-size: 14px; color: #8b949e; margin: 16px 0 8px; border-bottom: 1px solid #21262d; padding-bottom: 4px; }

.status-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px; margin-bottom: 16px;
}
.card {
  background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 12px;
}
.card .label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
.card .value { font-size: 18px; font-weight: 600; margin-top: 4px; }
.card .value.ok { color: #3fb950; }
.card .value.error { color: #f85149; }

.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.dot.green { background: #3fb950; }
.dot.red { background: #f85149; }

.log-table { width: 100%; border-collapse: collapse; }
.log-table th { text-align: left; font-size: 11px; color: #8b949e; padding: 4px 8px; border-bottom: 1px solid #21262d; }
.log-table td { padding: 4px 8px; border-bottom: 1px solid #161b22; font-size: 12px; }
.log-table tr:hover { background: #161b22; }

.tag {
  display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600;
}
.tag.ok { background: #0d3220; color: #3fb950; }
.tag.error { background: #3d1a1a; color: #f85149; }
.tag.dedup { background: #2d2d00; color: #d29922; }
.tag.disabled { background: #2d2d2d; color: #8b949e; }
.tag.commands { background: #1a2d3d; color: #58a6ff; }
.tag.content { background: #2d1a3d; color: #bc8cff; }

.key-test {
  background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 16px;
  text-align: center; margin: 16px 0;
}
.key-test .instruction { color: #8b949e; margin-bottom: 8px; }
.key-test .captured {
  font-size: 24px; font-weight: bold; color: #58a6ff;
  min-height: 36px; display: flex; align-items: center; justify-content: center;
}

.toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.btn {
  background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
  padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
  font-family: inherit;
}
.btn:hover { background: #30363d; border-color: #58a6ff; }
.btn.active { background: #1a3d5c; border-color: #58a6ff; color: #58a6ff; }

.bindings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; }
.binding-card {
  background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 8px;
  display: flex; align-items: center; gap: 8px;
}
.binding-key {
  background: #21262d; color: #58a6ff; padding: 2px 8px; border-radius: 4px;
  font-weight: 600; min-width: 40px; text-align: center;
}
.binding-action { font-size: 11px; color: #8b949e; }
.binding-card.off { opacity: 0.4; }

.empty { color: #484f58; text-align: center; padding: 20px; font-style: italic; }
</style>
</head>
<body>
<h1>cx-f1key Debug Console</h1>

<div class="toolbar">
  <button class="btn" id="refreshBtn">Refresh</button>
  <button class="btn" id="autoRefreshBtn">Auto: OFF</button>
  <button class="btn" id="pingBtn">Ping SW</button>
  <button class="btn" id="clearBtn">Clear Log</button>
  <button class="btn" id="debugToggle">Debug: OFF</button>
</div>

<div class="status-grid">
  <div class="card">
    <div class="label">Service Worker</div>
    <div class="value" id="swStatus">---</div>
  </div>
  <div class="card">
    <div class="label">Uptime</div>
    <div class="value" id="swUptime">---</div>
  </div>
  <div class="card">
    <div class="label">Version</div>
    <div class="value" id="extVersion">---</div>
  </div>
  <div class="card">
    <div class="label">Actions Logged</div>
    <div class="value" id="totalActions">---</div>
  </div>
</div>

<h2>Key Test</h2>
<div class="key-test">
  <div class="instruction">Press F-keys here to test capture (result shown below)</div>
  <div class="captured" id="capturedKey">---</div>
</div>

<h2>Bindings</h2>
<div class="bindings-grid" id="bindingsGrid"></div>

<h2>Action Log (latest 50)</h2>
<table class="log-table">
  <thead><tr><th>Time</th><th>Action</th><th>Source</th><th>Result</th><th>Detail</th></tr></thead>
  <tbody id="logBody"></tbody>
</table>

<script>
const MOD_SYMBOLS = { shift: '\u21e7', ctrl: '\u2303', alt: '\u2325', meta: '\u2318' };
const ACTION_LABELS = {
  closeTab: 'Close Tab', prevTab: 'Prev Tab', nextTab: 'Next Tab',
  reload: 'Reload', hardReload: 'Hard Reload', reopenTab: 'Reopen Tab',
};

let autoRefresh = false;
let autoRefreshTimer = null;

const fmtTime = (ts) => {
  const d = new Date(ts);
  return d.toLocaleTimeString('ja-JP', { hour12: false }) + '.' + String(d.getMilliseconds()).padStart(3, '0');
};

const fmtUptime = (ms) => {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return `${h}h ${m % 60}m`;
  if (m > 0) return `${m}m ${s % 60}s`;
  return `${s}s`;
};

const fmtKey = (key, modifiers = []) =>
  [...modifiers.map(m => MOD_SYMBOLS[m] || m), key].join('');

const refresh = async () => {
  try {
    const info = await chrome.runtime.sendMessage({ type: 'getDebugInfo' });
    if (!info) return;

    document.getElementById('swStatus').innerHTML = '<span class="dot green"></span>Running';
    document.getElementById('swStatus').className = 'value ok';
    document.getElementById('swUptime').textContent = fmtUptime(info.uptime);
    document.getElementById('swUptime').className = 'value ok';
    document.getElementById('extVersion').textContent = 'v' + info.version;
    document.getElementById('extVersion').className = 'value';
    document.getElementById('totalActions').textContent = info.actionLog.length;
    document.getElementById('totalActions').className = 'value';

    // Bindings
    const grid = document.getElementById('bindingsGrid');
    grid.innerHTML = '';
    if (info.bindings) {
      for (const [action, config] of Object.entries(info.bindings)) {
        const card = document.createElement('div');
        card.className = 'binding-card' + (config.enabled ? '' : ' off');
        card.innerHTML = `
          <span class="binding-key">${fmtKey(config.key, config.modifiers)}</span>
          <span class="binding-action">${ACTION_LABELS[action] || action}</span>
        `;
        grid.appendChild(card);
      }
    }

    // Action log (newest first)
    const tbody = document.getElementById('logBody');
    tbody.innerHTML = '';
    if (info.actionLog.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">No actions logged yet</td></tr>';
    } else {
      for (const entry of [...info.actionLog].reverse()) {
        const tr = document.createElement('tr');
        const rc = entry.result === 'ok' ? 'ok' : entry.result === 'dedup' ? 'dedup' : entry.result === 'disabled' ? 'disabled' : 'error';
        const sc = entry.source === 'commands' ? 'commands' : 'content';
        tr.innerHTML = `
          <td>${fmtTime(entry.ts)}</td>
          <td>${ACTION_LABELS[entry.action] || entry.action}</td>
          <td><span class="tag ${sc}">${entry.source || '-'}</span></td>
          <td><span class="tag ${rc}">${entry.result}</span></td>
          <td>${entry.error || (entry.tabId ? 'tab:' + entry.tabId : '')}</td>
        `;
        tbody.appendChild(tr);
      }
    }
  } catch (e) {
    document.getElementById('swStatus').innerHTML = '<span class="dot red"></span>Down';
    document.getElementById('swStatus').className = 'value error';
    document.getElementById('swUptime').textContent = '-';
    document.getElementById('swUptime').className = 'value error';
  }
};

// Key test — show what was pressed, don't prevent default so extension also captures
document.addEventListener('keydown', (e) => {
  const mods = [];
  if (e.shiftKey) mods.push('shift');
  if (e.ctrlKey) mods.push('ctrl');
  if (e.altKey) mods.push('alt');
  if (e.metaKey) mods.push('meta');
  const keyId = mods.length ? mods.join('+') + '+' + e.key : e.key;
  document.getElementById('capturedKey').textContent = keyId;
  // Refresh log after short delay to show the action that just fired
  setTimeout(refresh, 200);
}, true);

// Ping
document.getElementById('pingBtn').addEventListener('click', async () => {
  const start = performance.now();
  try {
    await chrome.runtime.sendMessage({ type: 'ping' });
    const ms = Math.round(performance.now() - start);
    document.getElementById('swStatus').innerHTML = `<span class="dot green"></span>${ms}ms`;
    document.getElementById('swStatus').className = 'value ok';
  } catch {
    document.getElementById('swStatus').innerHTML = '<span class="dot red"></span>No response';
    document.getElementById('swStatus').className = 'value error';
  }
});

// Auto refresh
document.getElementById('autoRefreshBtn').addEventListener('click', () => {
  autoRefresh = !autoRefresh;
  const btn = document.getElementById('autoRefreshBtn');
  if (autoRefresh) {
    btn.textContent = 'Auto: ON';
    btn.classList.add('active');
    autoRefreshTimer = setInterval(refresh, 1000);
  } else {
    btn.textContent = 'Auto: OFF';
    btn.classList.remove('active');
    clearInterval(autoRefreshTimer);
  }
});

// Clear log
document.getElementById('clearBtn').addEventListener('click', async () => {
  await chrome.runtime.sendMessage({ type: 'clearDebugLog' });
  refresh();
});

// Debug toggle (enables console logging in content script)
const updateDebugBtn = async () => {
  const result = await chrome.storage.local.get('debugEnabled');
  const btn = document.getElementById('debugToggle');
  if (result.debugEnabled) {
    btn.textContent = 'Debug: ON';
    btn.classList.add('active');
  } else {
    btn.textContent = 'Debug: OFF';
    btn.classList.remove('active');
  }
};

document.getElementById('debugToggle').addEventListener('click', async () => {
  const result = await chrome.storage.local.get('debugEnabled');
  await chrome.storage.local.set({ debugEnabled: !result.debugEnabled });
  updateDebugBtn();
});

document.getElementById('refreshBtn').addEventListener('click', refresh);

refresh();
updateDebugBtn();
</script>
</body>
</html>
