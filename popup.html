<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 280px; padding: 16px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #1a1a2e; color: #e0e0e0;
}
h1 { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 12px; text-align: center; }

.row { display: flex; align-items: center; padding: 5px 0; gap: 8px; }
.row.disabled .desc, .row.disabled .key { opacity: 0.4; }

/* Toggle switch */
.toggle { position: relative; display: inline-block; width: 28px; height: 16px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle .slider {
  position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
  background: #3d3d5c; border-radius: 16px; transition: 0.2s;
}
.toggle .slider:before {
  position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px;
  background: #888; border-radius: 50%; transition: 0.2s;
}
.toggle input:checked + .slider { background: #2d5a2d; }
.toggle input:checked + .slider:before { background: #4caf50; transform: translateX(12px); }

/* Key badge */
.key {
  background: #2d2d44; color: #7ecfff; font-size: 11px; font-weight: 600;
  padding: 3px 6px; border-radius: 4px; min-width: 36px; text-align: center;
  border: 1px solid #3d3d5c; cursor: pointer; flex-shrink: 0;
  font-family: inherit; outline: none; appearance: none; -webkit-appearance: none;
  line-height: 1.2; transition: all 0.2s;
}
.key:hover { background: #3d3d5c; border-color: #7ecfff; }
.key.recording {
  background: #5c3d1a; border-color: #ff9800; color: #ffcc80;
  animation: pulse 1s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

.desc { font-size: 12px; color: #b0b0c0; }
hr { border: none; border-top: 1px solid #2d2d44; margin: 6px 0; }

.actions { text-align: center; margin-top: 8px; }
.reset-btn {
  background: none; border: 1px solid #3d3d5c; color: #888;
  font-size: 10px; padding: 3px 10px; border-radius: 4px; cursor: pointer;
  font-family: inherit;
}
.reset-btn:hover { border-color: #7ecfff; color: #7ecfff; }

.hint { font-size: 9px; color: #555; text-align: center; margin-top: 6px; }

.footer {
  margin-top: 8px; text-align: center; display: flex; justify-content: space-between;
  align-items: center; border-top: 1px solid #2d2d44; padding-top: 8px;
}
.footer a { font-size: 11px; color: #7ecfff; text-decoration: none; cursor: pointer; }
.footer a:hover { text-decoration: underline; }
.footer button {
  background: none; border: none; cursor: pointer; font-size: 14px;
  color: #7ecfff; opacity: 0.7; padding: 2px 8px;
}
.footer button:hover { opacity: 1; }
</style>
</head>
<body>
<h1>Fキー タブ操作</h1>
<div id="bindings"></div>
<div class="actions"><button class="reset-btn" id="resetBtn">デフォルトに戻す</button></div>
<p class="hint">キーをクリックして変更（Escでキャンセル）</p>
<div class="footer">
  <a id="shortcuts">ショートカット設定</a>
  <a id="debugBtn" title="Debug Console">🐛</a>
  <button id="updateBtn" title="git pull で最新に更新">🔄</button>
</div>

<script src="popup.js"></script>
</body>
</html>
